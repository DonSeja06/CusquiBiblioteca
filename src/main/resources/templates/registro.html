<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Cusquibiblioteca</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'biblioteca-bg': '#FAF8F5',
                        'biblioteca-brown': '#B89B84',
                        'biblioteca-text': '#4A3C31',
                        'biblioteca-text-light': '#8C7B6E',
                    },
                    fontFamily: {
                        'serif': ['"Playfair Display"', 'serif'],
                        'sans': ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAF8F5; color: #4A3C31; transition: all 0.3s ease; }
        .dark body { background-color: #2A2421; color: #E8E3DF; }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

</head>
<body class="font-sans antialiased min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">

    <a th:href="@{/}" class="absolute top-6 left-6 md:top-10 md:left-10 flex items-center gap-2 text-biblioteca-text-light hover:text-biblioteca-brown transition-colors dark:text-gray-400 dark:hover:text-white font-medium">
        <i class="fa-solid fa-arrow-left"></i> Volver al inicio
    </a>

    <button onclick="document.documentElement.classList.toggle('dark')" class="absolute top-6 right-6 md:top-10 md:right-10 w-10 h-10 rounded-full flex items-center justify-center text-biblioteca-text-light hover:bg-biblioteca-brown/10 dark:text-gray-400 dark:hover:bg-white/10 transition-colors">
        <i class="fa-solid fa-moon dark:hidden"></i>
        <i class="fa-solid fa-sun hidden dark:block"></i>
    </button>

    <div class="max-w-4xl w-full bg-white dark:bg-[#352D29] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row-reverse transform transition-all">
        
        <!-- Lado Derecho: Imagen -->
        <div class="hidden md:block md:w-1/2 relative bg-biblioteca-brown">
            <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Libros y café" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-80">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-10">
                <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white mb-4">
                    <i class="fa-solid fa-pen-nib text-xl"></i>
                </div>
                <h2 class="text-3xl font-serif font-bold text-white leading-tight mb-2">Comienza tu viaje literario.</h2>
                <p class="text-gray-200 text-sm">Crea tu cuenta gratis y lleva un registro perfecto de todas tus lecturas.</p>
            </div>
        </div>

        <!-- Lado Izquierdo: Formulario -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 flex flex-col justify-center relative">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-serif font-bold text-biblioteca-text dark:text-white mb-2">Únete al Club</h1>
                <p class="text-biblioteca-text-light dark:text-gray-400 text-sm">Completa tus datos para crear una nueva cuenta.</p>
            </div>

            <form th:action="@{/registro}" th:object="${usuario}" method="post" class="space-y-4">
                
                <!-- DNI -->
                <div>
                    <label class="block text-sm font-medium text-biblioteca-text dark:text-gray-300 mb-1.5">Número de DNI</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-id-card text-gray-400"></i>
                        </div>
                        <input type="text" th:field="*{DNI}" required placeholder="Ej. 72345678" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-[#2A2421] border border-gray-200 dark:border-white/10 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-biblioteca-brown focus:border-transparent transition-all dark:text-white placeholder-gray-400">
                    </div>
                </div>

                <!-- Nombre Completo -->
                <div>
                    <label class="block text-sm font-medium text-biblioteca-text dark:text-gray-300 mb-1.5">Nombre Completo</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-gray-400"></i>
                        </div>
                        <input type="text" th:field="*{nombre}" required placeholder="Ej. Ana Torres" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-[#2A2421] border border-gray-200 dark:border-white/10 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-biblioteca-brown focus:border-transparent transition-all dark:text-white placeholder-gray-400">
                    </div>
                </div>

                <!-- Correo -->
                <div>
                    <label class="block text-sm font-medium text-biblioteca-text dark:text-gray-300 mb-1.5">Correo Electrónico</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" th:field="*{correo}" required placeholder="tu@correo.com" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-[#2A2421] border border-gray-200 dark:border-white/10 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-biblioteca-brown focus:border-transparent transition-all dark:text-white placeholder-gray-400">
                    </div>
                </div>

                <!-- Contraseña (NUEVO BLOQUE REAGREGADO) -->
                <div>
                    <label class="block text-sm font-medium text-biblioteca-text dark:text-gray-300 mb-1.5">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input type="password" th:field="*{contrasena}" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-[#2A2421] border border-gray-200 dark:border-white/10 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-biblioteca-brown focus:border-transparent transition-all dark:text-white placeholder-gray-400">
                    </div>
                    <p class="text-[11px] text-gray-400 mt-1.5 ml-1">Debe contener al menos 6 caracteres.</p>
                </div>

                <!-- Botón Submit -->
                <button type="submit" class="w-full bg-biblioteca-text hover:bg-[#322820] text-white font-bold py-3.5 rounded-xl transition-colors shadow-md mt-6 flex justify-center items-center gap-2">
                    Crear Cuenta <i class="fa-solid fa-user-plus text-sm"></i>
                </button>
                
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-biblioteca-text-light dark:text-gray-400">
                    ¿Ya tienes una cuenta? 
                    <a th:href="@{/login}" class="font-bold text-biblioteca-brown hover:underline">Inicia sesión aquí</a>
                </p>
            </div>

        </div>
    </div>
    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            
            if (html.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }
    </script>

</body>
</html>
