<!DOCTYPE html>
<html lang="es" class="scroll-smooth" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Cusquibiblioteca</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'biblioteca-bg': '#FAF8F5',
                        'biblioteca-text': '#4A3C31',
                        'biblioteca-brown': '#B89B84',
                    },
                    fontFamily: {
                        'serif': ['"Playfair Display"', 'serif'],
                        'sans': ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-biblioteca-bg text-biblioteca-text font-sans antialiased min-h-screen flex items-center justify-center p-4 dark:bg-[#2A2421] dark:text-white transition-colors">

    <div class="max-w-lg w-full bg-white dark:bg-[#352D29] rounded-[2rem] shadow-xl border border-red-200 dark:border-red-900/30 p-10 text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-red-500"></div>
        
        <div class="w-24 h-24 bg-red-50 dark:bg-red-900/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
            <i class="fa-solid fa-triangle-exclamation text-4xl"></i>
        </div>

        <h1 class="text-3xl font-serif font-bold mb-4">Ups, algo salió mal</h1>
        
        <!-- Aquí imprimimos el mensaje que mandas desde tu Java -->
        <div class="bg-red-50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/20 rounded-xl p-4 mb-8">
            <p class="text-sm text-red-600 dark:text-red-400 font-medium" th:text="${error != null ? error : 'Ha ocurrido un error inesperado en el servidor.'}"></p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="window.history.back()" class="bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300 px-6 py-3 rounded-full font-medium hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                <i class="fa-solid fa-arrow-left text-sm mr-2"></i> Regresar
            </button>
            <a th:href="@{/}" class="bg-biblioteca-brown text-white px-6 py-3 rounded-full font-medium hover:bg-[#9E816B] transition-colors shadow-md">
                Ir al Inicio
            </a>
        </div>
    </div>

</body>
</html>
