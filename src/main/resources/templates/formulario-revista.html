<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Nueva Revista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Agregar Nueva Revista</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/guardar-revista}" th:object="${revista}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Revista</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Autor / Editor</label>
                        <input type="text" class="form-control" th:field="*{autor}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" class="form-control" th:field="*{categoria}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Volumen</label>
                            <input type="number" class="form-control" th:field="*{volumen}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Edición</label>
                            <input type="number" class="form-control" th:field="*{edicion}" required>
                        </div>
                    </div>


                    <!-- Campo para la Descripción / Sinopsis -->
                    <div class="mb-3">
                        <label class="form-label">Descripción / Sinopsis</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3" placeholder="Escribe un breve resumen de la obra..."></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">URL de la Portada (Imagen)</label>
                        <input type="text" class="form-control" th:field="*{urlImagen}" placeholder="https://ejemplo.com/portada.jpg">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Guardar Revista</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
