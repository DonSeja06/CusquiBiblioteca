<!DOCTYPE html>
<html lang="es" class="scroll-smooth" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${revista.id == null ? 'Añadir Revista' : 'Editar Revista'}">Gestión de Revistas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'biblioteca-bg': '#FAF8F5',
                        'biblioteca-bg-dark': '#2A2421',
                        'biblioteca-brown': '#B89B84',
                        'biblioteca-brown-hover': '#9E816B',
                        'biblioteca-text': '#4A3C31',
                        'biblioteca-text-light': '#8C7B6E',
                        'pastel-blue': '#E4EDF2',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAF8F5; color: #4A3C31; transition: all 0.3s ease; }
        .dark body { background-color: #2A2421; color: #E8E3DF; }
        .glass-nav { background: rgba(250, 248, 245, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(184, 155, 132, 0.2); }
        .dark .glass-nav { background: rgba(42, 36, 33, 0.85); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-pastel-blue text-[#4A728A] flex items-center justify-center">
                    <i class="fa-solid fa-newspaper text-sm"></i>
                </div>
                <span class="font-serif font-bold text-xl text-biblioteca-text dark:text-white">Panel Interno</span>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="toggleDarkMode()" class="text-biblioteca-text-light hover:text-biblioteca-brown dark:hover:text-white transition-colors">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
                <a th:href="@{/catalogo}" class="text-sm font-medium text-biblioteca-text-light hover:text-biblioteca-brown dark:hover:text-white transition-colors">Ir al Catálogo</a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        
        <!-- Alertas -->
        <div th:if="${param.exito}" class="mb-6 bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg flex items-center gap-2 dark:bg-green-900/20 dark:border-green-800">
            <i class="fa-solid fa-check-circle"></i> Revista guardada correctamente.
        </div>
        <div th:if="${param.eliminado}" class="mb-6 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg flex items-center gap-2 dark:bg-red-900/20 dark:border-red-800">
            <i class="fa-solid fa-trash"></i> Revista eliminada permanentemente.
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- COLUMNA IZQUIERDA: EL FORMULARIO -->
            <div class="w-full lg:w-5/12 xl:w-1/3">
                <!-- Se mantiene el color azul de cabecera como detalle distintivo para revistas -->
                <div class="bg-white dark:bg-[#352D29] rounded-[2rem] shadow-xl border border-gray-200 dark:border-white/5 overflow-hidden sticky top-28">
                    
                    <div class="bg-blue-600 text-white text-center py-5 px-6">
                        <h1 class="text-2xl font-serif font-bold mb-1" th:text="${revista.id == null ? 'Agregar Nueva Revista' : 'Editar Revista'}">Agregar Nueva Revista</h1>
                    </div>

                    <div class="p-8">
                        <form th:action="@{/admin/guardar-revista}" th:object="${revista}" method="post" class="space-y-4">
                            <input type="hidden" th:field="*{id}" th:if="${revista.id != null}" />

                            <div>
                                <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">Nombre de la Revista</label>
                                <input type="text" th:field="*{nombre}" required class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white">
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">Autor / Editor</label>
                                <input type="text" th:field="*{autor}" required class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white">
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">Categoría</label>
                                <input type="text" th:field="*{categoria}" required class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">Volumen</label>
                                    <input type="number" th:field="*{volumen}" required min="0" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">Edición</label>
                                    <input type="number" th:field="*{edicion}" required min="0" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">Descripción / Sinopsis</label>
                                <textarea th:field="*{descripcion}" rows="3" placeholder="Escribe un breve resumen de la obra..." class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white resize-y"></textarea>
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-biblioteca-text dark:text-gray-300 mb-1">URL de la Portada (Imagen)</label>
                                <input type="url" th:field="*{urlImagen}" placeholder="https://ejemplo.com/portada.jpg" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors dark:text-white">
                            </div>
                            
                            <div class="flex items-center gap-2 pt-1">
                                <input type="checkbox" th:field="*{disponible}" class="w-4 h-4 text-blue-600 rounded border-gray-300">
                                <label class="text-xs font-medium text-biblioteca-text dark:text-gray-300">Disponible para Préstamo</label>
                            </div>

                            <div class="pt-4">
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-all shadow-md text-sm" th:text="${revista.id == null ? 'Guardar Revista' : 'Actualizar Revista'}">
                                </button>
                            </div>
                        </form>

                        <!-- Botón Eliminar y Botón Cancelar (Aparecen solo al Editar) -->
                        <div th:if="${revista.id != null}" class="mt-4 flex gap-2 pt-4 border-t border-gray-100 dark:border-gray-700">
                            <a th:href="@{/admin/agregar-revista}" class="w-1/2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-center font-bold py-2 rounded-lg text-sm hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                                Cancelar
                            </a>
                            <form th:action="@{/admin/eliminar-revista}" method="post" class="w-1/2" onsubmit="return confirm('¿Eliminar esta revista de forma permanente?');">
                                <input type="hidden" name="id" th:value="${revista.id}" />
                                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg text-sm transition-colors">
                                    Eliminar
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>

            <!-- COLUMNA DERECHA: LA LISTA DE REVISTAS -->
            <div class="w-full lg:w-7/12 xl:w-2/3">
                <div class="bg-white dark:bg-[#352D29] rounded-[2rem] shadow-sm border border-gray-200 dark:border-white/5 p-6 md:p-8">
                    <h2 class="text-2xl font-serif font-bold text-biblioteca-text dark:text-white mb-6">Revistas Registradas</h2>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        
                        <!-- Bucle para mostrar todas las revistas -->
                        <div th:each="r : ${revistas}" class="flex gap-4 p-4 rounded-xl border border-gray-100 dark:border-gray-700 hover:border-blue-300 hover:shadow-md transition-all bg-biblioteca-bg dark:bg-[#2A2421]">
                            
                            <img th:src="${r.urlImagen != null && !r.urlImagen.isEmpty() ? r.urlImagen : 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=300&q=80'}" class="w-16 h-24 object-cover rounded shadow-sm">
                            
                            <div class="flex flex-col justify-between flex-grow">
                                <div>
                                    <h3 class="font-serif font-bold text-biblioteca-text dark:text-white line-clamp-1 text-sm" th:text="${r.nombre}">Título</h3>
                                    <p class="text-[11px] text-gray-500 mb-1 line-clamp-1" th:text="${r.autor}">Editor</p>
                                    
                                    <div class="flex gap-1 mb-1">
                                        <span class="text-[9px] bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded font-bold uppercase" th:text="'Vol. ' + ${r.volumen}">Vol.</span>
                                        <span class="text-[9px] bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded font-bold uppercase" th:text="'Ed. ' + ${r.edicion}">Ed.</span>
                                    </div>
                                    <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase inline-block" th:text="${r.categoria}">Cat</span>
                                </div>
                                
                                <div class="mt-2 text-right">
                                    <a th:href="@{/admin/editar-revista/{id}(id=${r.id})}" class="text-xs bg-blue-600 text-white px-4 py-1.5 rounded-lg hover:bg-blue-700 transition-colors inline-block font-medium">
                                        <i class="fa-solid fa-pen-to-square mr-1"></i> Editar
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- Mensaje si no hay revistas -->
                        <div th:if="${#lists.isEmpty(revistas)}" class="col-span-full text-center py-10">
                            <p class="text-biblioteca-text-light italic text-sm">Aún no has registrado ninguna revista.</p>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            
            if (html.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }
    </script>
</body>
</html>
