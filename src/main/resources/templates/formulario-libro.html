<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Nuevo Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">Agregar Nuevo Libro</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/guardar-libro}" th:object="${libro}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre del Libro</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" class="form-control" th:field="*{autor}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" class="form-control" th:field="*{categoria}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ISBN</label>
                            <input type="text" class="form-control" th:field="*{isbn}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Editorial</label>
                            <input type="text" class="form-control" th:field="*{editorial}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Páginas</label>
                            <input type="number" class="form-control" th:field="*{cantidadPaginas}">
                        </div>
                    </div>

                    <!-- Campo para la Descripción / Sinopsis -->
                    <div class="mb-3">
                        <label class="form-label">Descripción / Sinopsis</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3" placeholder="Escribe un breve resumen de la obra..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">URL de la Portada (Imagen)</label>
                        <input type="text" class="form-control" th:field="*{urlImagen}" placeholder="https://ejemplo.com/imagen.jpg">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Guardar Libro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
